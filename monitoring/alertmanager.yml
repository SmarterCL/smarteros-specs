global:
  # The smarthost and SMTP sender used for mail notifications.
  # smtp_smarthost: 'localhost:587'
  # smtp_from: 'alertmanager@example.org'
  # smtp_auth_username: 'admin'
  # smtp_auth_password: 'password'

# The root route on which each incoming alert enters.
route:
  # The root route must have at least one receiver.
  receiver: 'default-receiver'
  # The labels by which incoming alerts are grouped together. For example,
  # multiple alerts coming in for cluster=A and job=node-exporter will be
  # batched into a single group.
  group_by: ['alertname', 'cluster', 'service']
  
  # When a new group of alerts is created by an incoming alert, you can
  # configure how long to wait before sending the first notification.
  group_wait: 30s

  # How long to wait before sending a notification about new alerts that
  # are added to a group of alerts that has already been notified about.
  group_interval: 5m

  # How long to wait before sending a notification again if it has already
  # been sent successfully for an alert.
  repeat_interval: 30m

receivers:
- name: 'default-receiver'
  # Add webhook, email, slack, pagerduty etc. as needed
  # For now, just logging to console/file
  webhook_configs:
    # Could add webhook to notify Telegram, Slack, etc.
    - url: 'http://localhost:3000/hooks/alert'  # Placeholder - would connect to n8n or other service