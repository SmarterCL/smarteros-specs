## 📡 ENDPOINTS

### REST API

```
Base URL: http://89.116.23.167:8080/api/v1

Endpoints:
  GET  /health              - Health check
  GET  /status              - Status general
  GET  /telemetry           - Telemetría en tiempo real
  GET  /telemetry/history   - Histórico de telemetría
  GET  /placas               - Listar placas
  GET  /placas/:id           - Obtener placa por ID
  POST /placas/:id/command  - Enviar comando a placa
  GET  /alerts              - Listar alertas
  POST /alerts              - Crear alerta
  GET  /metrics             - Métricas para Grafana
```

### WebSocket

```
URL: ws://89.116.23.167:8080/ws

Events:
  - telemetry:update → { placa_id, tipo, valor, timestamp }
  - alert:triggered → { alert_id, tipo, severidad, mensaje }
  - status:change → { placa_id, estado_anterior, estado_nuevo }
```

### MQTT Topics

```
picoclaw/telemetry/+       - Telemetría de todas las placas
picoclaw/telemetry/voltaje - Telemetría de voltaje
picoclaw/telemetry/rpm     - Telemetría de RPM
picoclaw/telemetry/temp    - Telemetría de temperatura
picoclaw/alerts/+          - Alertas del sistema
picoclaw/commands/+        - Comandos hacia placas
```

