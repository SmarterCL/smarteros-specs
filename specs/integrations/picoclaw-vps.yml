## 📊 MONITOREO

### Health Checks

```yaml
health_checks:
  - name: "PicoClaw API"
    url: "http://89.116.23.167:8080/api/v1/health"
    interval: 30s
    timeout: 5s
    
  - name: "PicoClaw MQTT"
    url: "http://89.116.23.167:1883"
    type: "tcp"
    interval: 30s
    
  - name: "PicoClaw InfluxDB"
    url: "http://89.116.23.167:8086/health"
    interval: 30s
    
  - name: "Grafana"
    url: "http://89.116.23.167:3000/api/health"
    interval: 30s
```

### Alertas

```yaml
alerts:
  - name: "Placa Offline"
    condition: "placa.estado == 'offline'"
    severity: "critical"
    notification: "telegram"
    
  - name: "Voltaje Alto"
    condition: "telemetry.voltaje > 250"
    severity: "warning"
    notification: "telegram"
    
  - name: "Temperatura Crítica"
    condition: "telemetry.temperatura > 80"
    severity: "critical"
    notification: "telegram"
    
  - name: "RPM Anormales"
    condition: "telemetry.rpm < 100 OR telemetry.rpm > 5000"
    severity: "warning"
    notification: "telegram"
```

