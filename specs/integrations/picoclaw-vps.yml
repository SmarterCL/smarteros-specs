## 📋 DESCRIPCIÓN

PicoClaw es el sistema de hardware industrial remoto de SmarterOS, desplegado en el VPS de Santiago. Proporciona telemetría, control y monitoreo de equipos industriales vía APIs REST y WebSockets.

