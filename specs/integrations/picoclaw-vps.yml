## 🔧 COMANDOS VPS

### Deploy en VPS

```bash
# Conectar al VPS
ssh root@89.116.23.167

# Ir al directorio
cd /opt/smarteros

# Crear directorios
mkdir -p picoclaw/{config,logs,mqtt/{config,data,log},influxdb/{data,config},telegraf}

# Copiar docker-compose
cp docker-compose.picoclaw.yml picoclaw/docker-compose.yml

# Iniciar servicios
cd picoclaw
docker compose up -d

# Verificar estado
docker compose ps

# Ver logs
docker compose logs -f picoclaw-api
```

### Verificar Estado

```bash
# Health check
curl http://localhost:8080/api/v1/health

# Ver telemetría
curl http://localhost:8080/api/v1/telemetry

# Ver placas
curl http://localhost:8080/api/v1/placas

# Ver métricas para Grafana
curl http://localhost:8080/api/v1/metrics
```

### Logs

```bash
# Ver logs en tiempo real
docker compose logs -f picoclaw-api
docker compose logs -f picoclaw-mqtt
docker compose logs -f picoclaw-influxdb
docker compose logs -f picoclaw-telegraf

# Ver logs específicos
docker compose logs --tail=100 picoclaw-api
```

### Reiniciar Servicios

```bash
# Reiniciar todos
docker compose restart

# Reiniciar específico
docker compose restart picoclaw-api

# Detener todos
docker compose down

# Iniciar todos
docker compose up -d
```

