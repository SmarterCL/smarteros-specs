## 🔗 INTEGRACIÓN CON MCP

### Configuración MCP

```json
{
  "mcpServers": {
    "picoclaw-vps": {
      "url": "http://89.116.23.167:8080/api/v1/mcp",
      "name": "PicoClaw VPS - Hardware Industrial",
      "description": "Telemetría y control de hardware industrial en VPS Santiago",
      "permissions": {
        "read": ["telemetry", "placas", "alerts", "metrics"],
        "write": ["commands"],
        "execute": ["get_telemetry", "send_command", "get_alerts"]
      }
    }
  }
}
```

### Herramientas MCP

```yaml
tools:
  - name: "get_telemetry"
    description: "Obtener telemetría en tiempo real"
    endpoint: "GET /telemetry"
    
  - name: "get_placas"
    description: "Listar placas conectadas"
    endpoint: "GET /placas"
    
  - name: "send_command"
