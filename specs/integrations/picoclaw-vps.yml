## 🔧 CONFIGURACIÓN

### Docker Compose (VPS)

```yaml
version: '3.8'

services:
  picoclaw-api:
    image: smartercl/picoclaw-api:latest
    container_name: picoclaw-api
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - MQTT_HOST=picoclaw-mqtt
      - MQTT_PORT=1883
      - INFLUXDB_HOST=picoclaw-influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_BUCKET=picoclaw_telemetry
    volumes:
      - /opt/smarteros/picoclaw/config:/app/config
      - /opt/smarteros/picoclaw/logs:/app/logs
    restart: unless-stopped
    networks:
      - picoclaw_net
      - monitor_net

  picoclaw-mqtt:
    image: eclipse-mosquitto:latest
    container_name: picoclaw-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - /opt/smarteros/picoclaw/mqtt/config:/mosquitto/config
      - /opt/smarteros/picoclaw/mqtt/data:/mosquitto/data
      - /opt/smarteros/picoclaw/mqtt/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - picoclaw_net

  picoclaw-influxdb:
    image: influxdb:2.7
    container_name: picoclaw-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=smarteros
      - DOCKER_INFLUXDB_INIT_PASSWORD=smarteros_password
      - DOCKER_INFLUXDB_INIT_ORG=smarteros
      - DOCKER_INFLUXDB_INIT_BUCKET=picoclaw_telemetry
    volumes:
      - /opt/smarteros/picoclaw/influxdb/data:/var/lib/influxdb2
      - /opt/smarteros/picoclaw/influxdb/config:/etc/influxdb2
    restart: unless-stopped
    networks:
      - picoclaw_net

  picoclaw-telegraf:
    image: telegraf:latest
    container_name: picoclaw-telegraf
    environment:
      - HOST_ETC=/host/etc
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /opt/smarteros/picoclaw/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /:/host:ro
    restart: unless-stopped
    networks:
      - picoclaw_net
    depends_on:
      - picoclaw-influxdb

networks:
  picoclaw_net:
    driver: bridge
  monitor_net:
    driver: bridge
    external: true
```

