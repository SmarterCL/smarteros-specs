## 🔐 SEGURIDAD

### Autenticación

```yaml
auth:
  method: "bearer_token"
  token_header: "Authorization"
  token_prefix: "Bearer"
  vault_path: "smarteros/picoclaw"
  
  tokens:
    admin:
      scope: ["read", "write", "admin"]
      vault_key: "admin_token"
    
    read_only:
      scope: ["read"]
      vault_key: "read_token"
    
    write_only:
      scope: ["write"]
      vault_key: "write_token"
```

### Firewall (UFW)

```bash
# Permitir APIs PicoClaw
ufw allow 8080/tcp comment "PicoClaw API"
ufw allow 1883/tcp comment "PicoClaw MQTT"
ufw allow 9001/tcp comment "PicoClaw MQTT WebSocket"

# Permitir Grafana
ufw allow 3000/tcp comment "Grafana"

# Permitir InfluxDB (solo red interna)
ufw allow from 10.0.0.0/8 to any port 8086 proto tcp
```

