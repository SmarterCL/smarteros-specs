## 📊 GRAFANA DASHBOARD

### Data Sources

```yaml
datasources:
  - name: PicoClaw InfluxDB
    type: influxdb
    url: http://picoclaw-influxdb:8086
    access: proxy
    database: picoclaw_telemetry
    org: smarteros
    default: true

  - name: PicoClaw API
    type: api
    url: http://picoclaw-api:8080/api/v1/metrics
    access: proxy
```

### Dashboards

```yaml
dashboards:
  - name: "PicoClaw - Overview"
    uid: "picoclaw-overview"
    panels:
      - title: "Voltaje Actual"
        type: gauge
        query: "SELECT last(\"valor\") FROM \"voltaje\" WHERE $timeFilter"
        
      - title: "RPM Actual"
        type: gauge
        query: "SELECT last(\"valor\") FROM \"rpm\" WHERE $timeFilter"
        
      - title: "Temperatura Actual"
        type: gauge
        query: "SELECT last(\"valor\") FROM \"temperatura\" WHERE $timeFilter"
        
      - title: "Telemetría Histórica"
        type: graph
        queries:
          - "SELECT mean(\"valor\") FROM \"voltaje\" WHERE $timeFilter GROUP BY time(5m)"
          - "SELECT mean(\"valor\") FROM \"rpm\" WHERE $timeFilter GROUP BY time(5m)"
          - "SELECT mean(\"valor\") FROM \"temperatura\" WHERE $timeFilter GROUP BY time(5m)"
          
      - title: "Alertas Activas"
        type: table
        query: "SELECT * FROM \"alerts\" WHERE \"estado\" = 'activa' AND $timeFilter"

  - name: "PicoClaw - Hardware Status"
    uid: "picoclaw-hardware"
    panels:
      - title: "Estado de Placas"
        type: stat
        query: "SELECT last(\"estado\") FROM \"placas\" WHERE $timeFilter GROUP BY \"placa_id\""
        
      - title: "Uptime"
        type: stat
        query: "SELECT last(\"uptime\") FROM \"system\" WHERE $timeFilter"
```

