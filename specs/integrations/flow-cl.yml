## 🔗 INTEGRACIÓN CON ODOO

### Crear Orden de Venta

```javascript
// Cuando Flow.cl confirma pago
POST /odoo/create-sale
{
  "flow_token": "abc123",
  "amount": 10000,
  "email": "cliente@example.com",
  "items": [
    {"product": "Canasta Premium", "qty": 1, "price": 10000}
  ]
}
```

### Generar DTE (SII)

```javascript
// Después de crear venta
POST /odoo/generate-dte
{
  "sale_id": "SO-2026-00123",
  "dte_type": 39,  // 39=Boleta, 33=Factura
  "sii_env": "certificacion"  // o "produccion"
}
```

