## 🔧 CONFIGURACIÓN

### 1. Obtener API Keys

**URL:** https://flow.cl/admin

```
1. Iniciar sesión en Flow.cl Admin
2. Ir a: Integración → API Keys
3. Copiar:
   • API Key
   • Secret Key
   • Commerce ID
4. Guardar en lugar seguro
```

### 2. Configurar en Supabase Vault

```sql
-- Insertar en Vault
INSERT INTO vault.secrets (name, secret)
VALUES 
  ('flow_api_key', 'tu_api_key_aqui'),
  ('flow_secret_key', 'tu_secret_key_aqui'),
  ('flow_commerce_id', 'tu_commerce_id_aqui');
```

### 3. Configurar en .env

```bash
# .env.local o .env.production
FLOW_API_KEY="tu_api_key_aqui"
FLOW_SECRET_KEY="tu_secret_key_aqui"
FLOW_COMMERCE_ID="tu_commerce_id_aqui"
FLOW_ENV="production"  # o "test"
```

### 4. Configurar Webhook en Flow.cl

**URL:** https://flow.cl/admin/webhooks

```
1. Ir a: Webhooks → Nuevo Webhook
2. Configurar:
   • URL: https://smarterbot.cl/flow/webhook
   • Eventos: payment.created, payment.updated, payment.reversed
   • Método: POST
   • Content-Type: application/json
3. Guardar
4. Copiar Secret de Webhook
```

