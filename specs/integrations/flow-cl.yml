# 💳 FLOW.CL INTEGRATION - SmarterOS v3.0

**Versión:** 1.0.0  
**Fecha:** 2026-03-06  
**Estado:** Pendiente de API Keys  
**Ambiente:** Producción

---

## 📋 DESCRIPCIÓN

Flow.cl es la pasarela de pagos principal para SmarterOS en Chile. Procesa pagos en CLP mediante Webpay Plus, Webpay One Click, y otras modalidades.

---

## 🔐 CREDENTIALS REQUERIDAS

### Producción

```bash
FLOW_API_KEY="tu_api_key_de_produccion"
FLOW_SECRET_KEY="tu_secret_key_de_produccion"
FLOW_COMMERCE_ID="tu_commerce_id"
```

### Test (Certificación)

```bash
FLOW_API_KEY_TEST="tu_api_key_de_test"
FLOW_SECRET_KEY_TEST="tu_secret_key_de_test"
FLOW_COMMERCE_ID_TEST="tu_commerce_id_test"
```

