## 🧪 TEST DE INTEGRACIÓN

### 1. Crear Pago de Prueba

```bash
curl -X POST http://localhost:3061/flow/create-payment \
  -H "Content-Type: application/json" \
  -d '{
    "amount": 10000,
    "email": "test@example.com",
    "subject": "Pago de prueba",
    "currency": "CLP"
  }'
```

### 2. Simular Webhook

```bash
curl -X POST http://localhost:3061/flow/webhook \
  -H "Content-Type: application/json" \
  -d '{
    "token": "test-token-123",
    "status": "APPROVED",
    "amount": 10000,
    "currency": "CLP",
    "buyer_email": "test@example.com",
    "external_id": "ORDER-TEST-001"
  }'
```

### 3. Verificar en Telegram

```
@smarterbot

Debería llegar:
💰 Pago Aprobado

Orden: ORDER-TEST-001
Monto: $10.000 CLP
Flow Token: test-token-123
Estado: ✅ Aprobado
```

