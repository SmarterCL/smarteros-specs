## 📡 ENDPOINTS

### Flow.cl API

```
Base URL (Producción): https://www.flow.cl/api
Base URL (Test): https://sandbox.flow.cl/api

Endpoints:
  POST /v1/payment/create     - Crear pago
  GET  /v1/payment/get/:id    - Obtener pago
  POST /v1/payment/refund     - Reembolsar
  GET  /v1/commerce/balance   - Obtener saldo
```

### Webhook Handler (SmarterOS)

```
POST /flow/webhook
  • Valida firma
  • Procesa payment
  • Actualiza Odoo
  • Notifica Telegram
  • Genera DTE

GET /flow/webhook/status
  • Estado del webhook
  • Últimos eventos
```

