## 🔧 COMANDOS MCP (Cloudflare MCP)

### Listar Zonas

```
/cf dns zones
```

### Listar DNS Records

```
/cf dns list smarterprop.cl
```

### Crear A Record

```
/cf dns create smarterprop.cl A 89.116.23.167
```

### Crear CNAME Record

```
/cf dns create it.smarterprop.cl CNAME smarterprop.cl
```

### Crear TXT Record

```
/cf dns create smarterprop.cl TXT "google-site-verification=xxx"
```

---

## 🧪 VERIFICACIÓN

### 1. Verificar DNS Propagation

```bash
# Verificar A record
dig smarterprop.cl A +short
# Esperado: 89.116.23.167

# Verificar CNAME
dig it.smarterprop.cl CNAME +short
# Esperado: smarterprop.cl.

# Verificar MX
dig smarterprop.cl MX +short
# Esperado: ASPMX.L.GOOGLE.COM.
```

### 2. Verificar SSL

```bash
# Verificar certificado SSL
curl -I https://smarterprop.cl
# Esperado: HTTP/2 200

# Verificar cadena SSL
openssl s_client -connect smarterprop.cl:443 -servername smarterprop.cl
```

### 3. Verificar desde MCP

```
/cf status smarterprop.cl
```

