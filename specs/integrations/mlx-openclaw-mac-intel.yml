## 🐳 DOCKER COMPOSE - N8N + OLLAMA

```yaml
version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-smarteros
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - smarteros-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-smarteros
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - smarteros-net
    # Nota: En Mac Intel, mejor correr Ollama nativo (no Docker)
    # para mejor acceso a GPU Intel

volumes:
  n8n_data:
  ollama_data:

networks:
  smarteros-net:
    driver: bridge
```

