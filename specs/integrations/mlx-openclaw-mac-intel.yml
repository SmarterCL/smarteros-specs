## 🔧 INSTALACIÓN DE OLLAMA

### Paso 1: Instalar Ollama

```bash
# Descargar e instalar
curl -fsSL https://ollama.com/install.sh | sh

# O con Homebrew
brew install ollama
```

### Paso 2: Iniciar Ollama

```bash
# Iniciar servicio
ollama serve &

# Verificar
ollama list
```

### Paso 3: Descargar Modelos

```bash
# Llama 3.1 8B (Recomendado)
ollama pull llama3.1:8b

# Mistral 7B (Alternativa liviana)
ollama pull mistral:7b

# Phi-3 Mini (Muy liviano)
ollama pull phi3:mini
```

### Paso 4: Verificar GPU

```bash
# Verificar uso de GPU
ollama run llama3.1:8b "Hola, ¿me escuchas?"

# Monitor de Actividad → GPU
# Deberías ver "Intel Iris Plus Graphics" activa
```

