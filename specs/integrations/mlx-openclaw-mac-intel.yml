## 📱 CONEXIÓN DESDE TERMUX (RED LOCAL)

### Paso 1: Obtener IP Local del Mac

```bash
# En Mac
ipconfig getifaddr en0
# Ejemplo: 192.168.1.100
```

### Paso 2: Configurar Ollama para escuchar en red

```bash
# En Mac
launchctl setenv OLLAMA_HOST "0.0.0.0:11434"

# Reiniciar Ollama
ollama serve
```

### Paso 3: Script Termux

```bash
#!/data/data/com.termux/files/usr/bin/bash
# ollama-termux.sh

MAC_LOCAL_IP="192.168.1.100"  # Tu IP local del Mac
OLLAMA_PORT="11434"

echo "🤖 Consultando IA Local en Mac..."
curl -X POST "http://$MAC_LOCAL_IP:$OLLAMA_PORT/api/generate" \
  -H "Content-Type: application/json" \
  -d '{
    "model": "llama3.1:8b",
    "prompt": "¿Cuál es el estado del sistema SmarterOS?",
    "stream": false
  }' | jq '.response'
```

