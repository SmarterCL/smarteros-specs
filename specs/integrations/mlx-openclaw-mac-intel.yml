## 🧪 TEST DE IA LOCAL

### Test 1: Ollama Directo

```bash
# Ejecutar modelo
ollama run llama3.1:8b "Explica qué es SmarterOS en 2 frases"

# Output esperado:
# SmarterOS es un sistema operativo inteligente que integra...
```

### Test 2: n8n Webhook

```bash
# Enviar webhook a n8n
curl -X POST http://localhost:5678/webhook/ia-local \
  -H "Content-Type: application/json" \
  -d '{"prompt": "¿Qué es PicoClaw?"}'

# Output esperado:
# {"response": "PicoClaw es un sistema de hardware industrial..."}
```

### Test 3: MCP Agent con IA

```bash
# MCP Session con IA
curl http://localhost:3050/mcp/chat \
  -H "Content-Type: application/json" \
  -d '{
    "message": "Analiza las ventas de hoy",
    "model": "llama3.1:8b"
  }'
```

