## 🔗 INTEGRACIÓN N8N + OLLAMA

### Workflow n8n: Procesar con IA Local

```json
{
  "name": "IA Local con Ollama",
  "nodes": [
    {
      "name": "Webhook",
      "type": "n8n-nodes-base.webhook",
      "parameters": {
        "httpMethod": "POST",
        "path": "ia-local"
      }
    },
    {
      "name": "HTTP Request a Ollama",
      "type": "n8n-nodes-base.httpRequest",
      "parameters": {
        "method": "POST",
        "url": "http://localhost:11434/api/generate",
        "body": {
          "model": "llama3.1:8b",
          "prompt": "={{ $json.body.prompt }}",
          "stream": false
        }
      }
    },
    {
      "name": "Responder Webhook",
      "type": "n8n-nodes-base.respondToWebhook",
      "parameters": {
        "respondWith": "json",
        "responseBody": "={{ $json.response }}"
      }
    }
  ]
}
```

