## 🔧 CONEXIÓN FÍSICA

### Paso 1: Instalar Drivers

```bash
# macOS (Homebrew)
brew install libusb

# FTDI Drivers
# Descargar de: https://ftdichip.com/drivers/vcp-drivers/

# CP210x Drivers
# Descargar de: https://www.silabs.com/developers/usb-to-uart-bridge-vcp-drivers
```

### Paso 2: Conectar Placas

```
1. Conectar Placa 1 (Voltaje) → USB Port 1
2. Conectar Placa 2 (RPM) → USB Port 2
3. Conectar Placa 3 (Temperatura) → USB Port 4
```

### Paso 3: Verificar Puertos

```bash
# macOS
ls -la /dev/cu.usbserial*
# Esperado:
# /dev/cu.usbserial-1
# /dev/cu.usbserial-2
# /dev/cu.usbserial-3

# Linux
ls -la /dev/ttyUSB*
# Esperado:
# /dev/ttyUSB0
# /dev/ttyUSB1
# /dev/ttyUSB2
```

### Paso 4: Verificar Permisos

```bash
# macOS (generalmente no requiere permisos especiales)
ls -l /dev/cu.usbserial-1

# Linux (agregar usuario al grupo dialout)
sudo usermod -a -G dialout $USER
sudo chmod 666 /dev/ttyUSB0
```

