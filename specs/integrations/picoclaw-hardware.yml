## 🔧 REQUISITOS DE HARDWARE

### Placas USB-Serial

| Componente | Especificación | Cantidad |
|------------|----------------|----------|
| **Chip** | FTDI FT232RL o CP2102 | 3 |
| **Voltaje** | 3.3V / 5V seleccionable | 3 |
| **TX/RX** | LEDs indicadores | 3 |
| **Cable USB** | USB-A a Micro-USB | 3 |

### Sensores

| Sensor | Tipo | Rango | Placa |
|--------|------|-------|-------|
| **Voltaje** | AC 0-250V | 0-5V DC | Placa 1 |
| **RPM** | Hall Effect | 0-10000 RPM | Placa 2 |
| **Temperatura** | DS18B20 | -55°C a 125°C | Placa 3 |

