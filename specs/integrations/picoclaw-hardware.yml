## 📊 GRAFANA DASHBOARD

### Data Source: InfluxDB

```
URL: http://localhost:8086
Bucket: picoclaw_telemetry
Org: smarteros
Token: tu_token_aqui
```

### Paneles

| Panel | Tipo | Query |
|-------|------|-------|
| **Voltaje Actual** | Gauge | `SELECT last("valor") FROM "voltaje"` |
| **RPM Actual** | Gauge | `SELECT last("valor") FROM "rpm"` |
| **Temperatura Actual** | Gauge | `SELECT last("valor") FROM "temperatura"` |
| **Histórico** | Graph | `SELECT mean("valor") FROM * WHERE $timeFilter GROUP BY time(5m)` |
| **Alertas** | Table | `SELECT * FROM "alerts" WHERE "estado" = 'activa'` |

