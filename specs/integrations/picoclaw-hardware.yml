## 🧪 TEST DE CONEXIÓN

### 1. Hardware Test Script

```bash
cd /Users/mac/webcontrol.smarterbot.cl/tests
node picoclaw-hardware-test.js
```

**Output esperado:**
```
✅ Placa 1 (Voltaje): /dev/cu.usbserial-1 - CONNECTED
✅ Placa 2 (RPM): /dev/cu.usbserial-2 - CONNECTED
✅ Placa 3 (Temperatura): /dev/cu.usbserial-3 - CONNECTED

Conectadas: 3/3
```

### 2. Serial Read Test

```bash
# Leer datos seriales
screen /dev/cu.usbserial-1 115200

# O con node
node -e "
const SerialPort = require('serialport');
const port = new SerialPort('/dev/cu.usbserial-1', { baudRate: 115200 });
port.on('data', data => console.log(data.toString()));
"
```

### 3. MQTT Test

```bash
# Suscribirse a topic MQTT
mosquitto_sub -h localhost -t "picoclaw/telemetry/#" -v

# Esperado:
# picoclaw/telemetry/voltaje {"placa_id":1,"valor":220.5,"timestamp":"2026-03-06T12:00:00Z"}
# picoclaw/telemetry/rpm {"placa_id":2,"valor":1500.0,"timestamp":"2026-03-06T12:00:00Z"}
# picoclaw/telemetry/temp {"placa_id":3,"valor":45.2,"timestamp":"2026-03-06T12:00:00Z"}
```

